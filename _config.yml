title: Johnathan Croft
author:
  name: Johnathan Croft
  email: your-email@example.com
description: >-
  A professional portfolio and blog exploring philosophy, thoughts, and projects.

# --- Deployment Settings ---
# `url` is your main GitHub Pages domain.
url: "https://your-username.github.io" # Replace with your GitHub username
# `baseurl` is the name of your repository.
baseurl: "/philosophy-website"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - docs/

# Social media links
social:
  linkedin: https://www.linkedin.com/in/your-username
  github: https://github.com/your-username
  substack: https://latelythinking.substack.com
  goodreads: https://www.goodreads.com/user/show/your-id
  cv: /assets/documents/resume.pdf
